name: Security Scheduled Checks

on:
  workflow_dispatch:
  schedule:
    # Daily (UTC)
    - cron: "25 2 * * *"

permissions:
  contents: read

concurrency:
  group: security-scheduled-checks
  cancel-in-progress: false

jobs:
  security-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show runtime versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! npm ci --no-audit --fund=false; then
            echo "::warning::npm ci failed, retrying once..."
            sleep 10
            if ! npm ci --no-audit --fund=false; then
              echo "::warning::npm ci failed twice, falling back to npm install for scheduled checks."
              npm install --no-audit --fund=false
            fi
          fi

      - name: Security tests
        run: npm run test:security

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/send_telegram.sh "${{ job.status }}" "Daily Security Checks"
