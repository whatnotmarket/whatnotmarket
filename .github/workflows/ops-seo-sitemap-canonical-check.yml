name: Ops SEO Sitemap Canonical Check

on:
  workflow_dispatch:
  schedule:
    # Daily at 05:55 UTC
    - cron: "55 5 * * *"

permissions:
  contents: read

concurrency:
  group: ops-seo-sitemap-canonical-check
  cancel-in-progress: false

jobs:
  seo-integrity:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL || vars.SECURITY_AUDIT_TARGET_URL || 'https://openlymarket.xyz' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
      SEO_CANONICAL_SAMPLE_LIMIT: ${{ vars.SEO_CANONICAL_SAMPLE_LIMIT || '5' }}
      SEO_ALLOWED_HTTP_STATUSES: ${{ vars.SEO_ALLOWED_HTTP_STATUSES || '200,503' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! npm ci --no-audit --fund=false; then
            echo "::warning::npm ci failed, retrying once..."
            sleep 10
            if ! npm ci --no-audit --fund=false; then
              echo "::warning::npm ci failed twice, falling back to npm install."
              npm install --no-audit --fund=false
            fi
          fi

      - name: Run SEO sitemap and canonical check
        id: seo
        shell: bash
        run: |
          set -euo pipefail
          REPORT_JSON="reports/ops/seo-sitemap-canonical-check.json"
          REPORT_HTML="${RUNNER_TEMP}/ops-seo-sitemap-canonical-check.html"

          set +e
          node scripts/ops/check-seo-sitemap-canonical.mjs \
            --json-output "${REPORT_JSON}" \
            --telegram-output "${REPORT_HTML}" \
            --target-url "${PRODUCTION_BASE_URL}" \
            --sample-limit "${SEO_CANONICAL_SAMPLE_LIMIT}" \
            --allowed-statuses "${SEO_ALLOWED_HTTP_STATUSES}"
          EXIT_CODE=$?
          set -e

          echo "report_json=${REPORT_JSON}" >> "$GITHUB_OUTPUT"
          echo "report_html=${REPORT_HTML}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

      - name: Upload SEO integrity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-seo-sitemap-canonical-check
          path: ${{ steps.seo.outputs.report_json }}
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_PARSE_MODE: HTML
          TELEGRAM_MESSAGE_FILE: ${{ steps.seo.outputs.report_html }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/send_telegram.sh "${{ job.status }}" "Ops SEO Sitemap Canonical Check" "${PRODUCTION_BASE_URL}"

      - name: Fail workflow on critical SEO issues
        if: ${{ steps.seo.outputs.exit_code != '0' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::error::SEO sitemap/canonical check detected critical issues."
          exit 1
