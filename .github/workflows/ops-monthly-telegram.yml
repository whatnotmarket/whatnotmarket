name: Ops Monthly Jobs

on:
  workflow_dispatch:
  schedule:
    # 1st day of month at 02:20 UTC
    - cron: "20 2 1 * *"

permissions:
  contents: read

concurrency:
  group: ops-monthly-jobs
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || vars.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE || vars.SUPABASE_SERVICE_ROLE }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show runtime versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! npm ci --no-audit --fund=false; then
            echo "::warning::npm ci failed, retrying once..."
            sleep 10
            if ! npm ci --no-audit --fund=false; then
              echo "::warning::npm ci failed twice, falling back to npm install."
              npm install --no-audit --fund=false
            fi
          fi

      - name: Validate required runtime secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${NEXT_PUBLIC_SUPABASE_URL:-}" ]] || missing+=("NEXT_PUBLIC_SUPABASE_URL (or SUPABASE_URL)")
          [[ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] || missing+=("SUPABASE_SERVICE_ROLE_KEY (or SUPABASE_SERVICE_KEY)")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required secrets/vars for monthly ops jobs: ${missing[*]}"
            exit 1
          fi

      - name: Run monthly cron group
        run: npm run cron:monthly

      - name: Prepare Telegram report (HTML)
        if: always()
        id: telegram
        shell: bash
        run: |
          set -euo pipefail
          REPORT_FILE="${RUNNER_TEMP}/ops-monthly-telegram.html"
          node scripts/ops/generate-cron-group-telegram-report.mjs \
            --group monthly \
            --owner "${GITHUB_RUN_ID}" \
            --status "${{ job.status }}" \
            --output "${REPORT_FILE}"
          echo "message_file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram (workflow-level)
        if: always()
        env:
          TELEGRAM_PARSE_MODE: HTML
          TELEGRAM_MESSAGE_FILE: ${{ steps.telegram.outputs.message_file }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/send_telegram.sh "${{ job.status }}" "Ops Monthly Jobs"
