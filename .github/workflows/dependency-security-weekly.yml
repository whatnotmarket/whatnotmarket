name: Weekly Dependency Security Scan

on:
  workflow_dispatch:
  schedule:
    # Monday at 03:40 UTC
    - cron: "40 3 * * 1"

permissions:
  contents: read

concurrency:
  group: dependency-security-weekly
  cancel-in-progress: false

jobs:
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production deps)
        id: audit
        shell: bash
        run: |
          set -euo pipefail
          npm audit --omit=dev --json > npm-audit.json || true
          node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('npm-audit.json','utf8')); const v=d.metadata?.vulnerabilities||{}; const high=(v.high||0)+(v.critical||0); console.log('Vulnerabilities:', JSON.stringify(v)); if(high>0){process.exit(1)}"

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          if-no-files-found: error
          retention-days: 30

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/send_telegram.sh "${{ job.status }}" "Weekly Dependency Security Scan"
