name: Production Smoke Check

on:
  workflow_dispatch:
  schedule:
    # Daily (UTC)
    - cron: "10 5 * * *"

permissions:
  contents: read

concurrency:
  group: production-smoke-check
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      SMOKE_EXPECT_ROOT_STATUSES: ${{ vars.SMOKE_EXPECT_ROOT_STATUSES }}
      SMOKE_EXPECT_MAINTENANCE_STATUSES: ${{ vars.SMOKE_EXPECT_MAINTENANCE_STATUSES }}
      SMOKE_EXPECT_API_OPTIONS_STATUSES: ${{ vars.SMOKE_EXPECT_API_OPTIONS_STATUSES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="${PRODUCTION_BASE_URL:-https://openlymarket.xyz}"
          echo "BASE_URL=${BASE_URL}" >> "$GITHUB_ENV"

      - name: Run smoke checks
        id: smoke
        shell: bash
        run: |
          set -euo pipefail

          status_in_list() {
            local status="$1"
            local allowed_csv="$2"
            IFS=',' read -r -a allowed <<<"${allowed_csv}"
            for candidate in "${allowed[@]}"; do
              candidate="$(echo "${candidate}" | xargs)"
              if [[ "${status}" == "${candidate}" ]]; then
                return 0
              fi
            done
            return 1
          }

          check_status() {
            local url="$1"
            curl --silent --show-error --location --output /dev/null --write-out "%{http_code}" "$url"
          }

          ROOT_EXPECTED="${SMOKE_EXPECT_ROOT_STATUSES:-200,503}"
          MAINTENANCE_EXPECTED="${SMOKE_EXPECT_MAINTENANCE_STATUSES:-200,503}"
          API_OPTIONS_EXPECTED="${SMOKE_EXPECT_API_OPTIONS_STATUSES:-204}"

          ROOT_STATUS="$(check_status "${BASE_URL}/")"
          MAINTENANCE_STATUS="$(check_status "${BASE_URL}/maintenance")"
          API_OPTIONS_STATUS="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" -X OPTIONS "${BASE_URL}/api/maintenance/early-access")"

          echo "root_status=${ROOT_STATUS}" >> "$GITHUB_OUTPUT"
          echo "maintenance_status=${MAINTENANCE_STATUS}" >> "$GITHUB_OUTPUT"
          echo "api_options_status=${API_OPTIONS_STATUS}" >> "$GITHUB_OUTPUT"

          status_in_list "${ROOT_STATUS}" "${ROOT_EXPECTED}"
          status_in_list "${MAINTENANCE_STATUS}" "${MAINTENANCE_EXPECTED}"
          status_in_list "${API_OPTIONS_STATUS}" "${API_OPTIONS_EXPECTED}"

      - name: Prepare Telegram message (HTML)
        if: always()
        id: telegram
        shell: bash
        run: |
          set -euo pipefail

          ROOT_STATUS="${{ steps.smoke.outputs.root_status || 'n/a' }}"
          MAINTENANCE_STATUS="${{ steps.smoke.outputs.maintenance_status || 'n/a' }}"
          API_OPTIONS_STATUS="${{ steps.smoke.outputs.api_options_status || 'n/a' }}"

          ROOT_EXPECTED="${SMOKE_EXPECT_ROOT_STATUSES:-200,503}"
          MAINTENANCE_EXPECTED="${SMOKE_EXPECT_MAINTENANCE_STATUSES:-200,503}"
          API_OPTIONS_EXPECTED="${SMOKE_EXPECT_API_OPTIONS_STATUSES:-204}"

          status_icon() {
            local status="$1"
            local allowed_csv="$2"
            IFS=',' read -r -a allowed <<<"${allowed_csv}"
            for candidate in "${allowed[@]}"; do
              candidate="$(echo "${candidate}" | xargs)"
              if [[ "${status}" == "${candidate}" ]]; then
                echo "🟢"
                return
              fi
            done
            echo "🔴"
          }

          ROOT_ICON="$(status_icon "${ROOT_STATUS}" "${ROOT_EXPECTED}")"
          MAINTENANCE_ICON="$(status_icon "${MAINTENANCE_STATUS}" "${MAINTENANCE_EXPECTED}")"
          API_ICON="$(status_icon "${API_OPTIONS_STATUS}" "${API_OPTIONS_EXPECTED}")"

          OVERALL_ICON="🟢"
          if [[ "${{ job.status }}" != "success" ]]; then
            OVERALL_ICON="🔴"
          elif [[ "${ROOT_ICON}" == "🔴" || "${MAINTENANCE_ICON}" == "🔴" || "${API_ICON}" == "🔴" ]]; then
            OVERALL_ICON="🟠"
          fi

          MESSAGE_FILE="${RUNNER_TEMP}/production-smoke-telegram.html"
          {
            printf '<b>🚦 Production Smoke Check</b>\n\n'
            printf '🎯 <b>Target:</b> %s\n' "${BASE_URL}"
            printf '%s <b>Workflow status:</b> %s\n\n' "${OVERALL_ICON}" "${{ job.status }}"
            printf '<b>Checks</b>\n'
            printf '%s <b>GET /</b> -> %s <i>(expected: %s)</i>\n' "${ROOT_ICON}" "${ROOT_STATUS}" "${ROOT_EXPECTED}"
            printf '%s <b>GET /maintenance</b> -> %s <i>(expected: %s)</i>\n' "${MAINTENANCE_ICON}" "${MAINTENANCE_STATUS}" "${MAINTENANCE_EXPECTED}"
            printf '%s <b>OPTIONS /api/maintenance/early-access</b> -> %s <i>(expected: %s)</i>\n\n' "${API_ICON}" "${API_OPTIONS_STATUS}" "${API_OPTIONS_EXPECTED}"
            printf '<b>How to fix if red</b>\n'
            printf '- Verify active mode (maintenance vs live) and expected status vars.\n'
            printf '- Check edge/proxy rewrites and middleware behavior.\n'
            printf '- Confirm API route and CORS preflight handling.\n'
          } > "${MESSAGE_FILE}"

          echo "message_file=${MESSAGE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_PARSE_MODE: HTML
          TELEGRAM_MESSAGE_FILE: ${{ steps.telegram.outputs.message_file }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/send_telegram.sh "${{ job.status }}" "Production Smoke Check" "${BASE_URL}"
