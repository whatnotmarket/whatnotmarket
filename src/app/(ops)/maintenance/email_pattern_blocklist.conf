# Disposable/test aliases often used by throwaway signups
^(?:test|fake|spam|temp|trash|disposable|mailinator|noreply|no-reply)(?:[._+-]?\d*)@

# Suspicious generator pattern: very short alpha prefix + long digit tail
^[a-z]{1,2}\d{6,}@

# Suspicious generator pattern: purely numeric local part
^\d{8,}@

# Punctuation burst in local-part
^[^@]{0,64}[._+-]{3,}[^@]*@
